<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD INTELLIGENCE · Enterprise Dashboard</title>

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind with custom config -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js for advanced 3D -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #03050A;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Premium noise texture overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMjUiIC8+PC9zdmc+');
            opacity: 0.4;
            pointer-events: none;
            z-index: 1000;
        }

        /* Custom glass morphism */
        .glass-premium {
            background: rgba(10, 15, 25, 0.4);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(31, 199, 98, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(31, 199, 98, 0.1) inset,
                0 0 30px -10px rgba(31, 199, 98, 0.3);
        }

        .glass-premium-light {
            background: rgba(20, 30, 45, 0.3);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        /* Sidebar styles */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            background: rgba(5, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(31, 199, 98, 0.15);
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: radial-gradient(circle at 30% 30%, #4ade80, #0a8a40);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(31, 199, 98, 0.3);
        }

        .logo-text {
            font-weight: 700;
            font-size: 18px;
            color: white;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .logo-text {
            opacity: 0;
        }

        .collapse-btn {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
        }

        .collapse-btn:hover {
            background: rgba(31, 199, 98, 0.1);
            border-color: rgba(31, 199, 98, 0.3);
            color: #1fc762;
        }

        .sidebar-menu {
            padding: 20px 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, rgba(31, 199, 98, 0.15), transparent);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .menu-item:hover {
            background: rgba(31, 199, 98, 0.05);
            color: white;
        }

        .menu-item:hover::before {
            width: 100%;
        }

        .menu-item.active {
            background: rgba(31, 199, 98, 0.1);
            color: #1fc762;
            box-shadow: 0 0 20px rgba(31, 199, 98, 0.1);
        }

        .menu-item.active::before {
            width: 4px;
            background: #1fc762;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            min-width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .menu-text {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .menu-text {
            opacity: 0;
            pointer-events: none;
        }

        .menu-badge {
            margin-left: auto;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .sidebar.collapsed .menu-badge {
            opacity: 0;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 20px 16px;
        }

        /* Main content area */
        .main-wrapper {
            margin-left: 280px;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .main-wrapper::-webkit-scrollbar {
            display: none;
        }

        .main-wrapper.sidebar-collapsed {
            margin-left: 80px;
        }

        /* Department content styles */
        .department-content {
            padding: 100px 30px 30px 30px;
            min-height: 100vh;
            position: relative;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .content-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Küçültülmüş stat kartları */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(10, 20, 35, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(31, 199, 98, 0.3);
            box-shadow: 0 20px 40px -20px rgba(31, 199, 98, 0.3);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(31, 199, 98, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: #1fc762;
            font-size: 18px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-change {
            font-size: 11px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive {
            color: #22c55e;
        }

        .stat-change.negative {
            color: #ef4444;
        }

        /* Graf Container - Boyuna büyütülmüş */
        .graph-container {
            background: rgba(10, 20, 35, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(31, 199, 98, 0.15);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            height: 550px;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .graph-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Node styles - eski graf sisteminden */
        .node {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            cursor: pointer;
        }

        .node:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
            z-index: 100;
        }

        .node-core {
            width: 120px;
            height: 120px;
            left: calc(50% - 60px);
            top: calc(50% - 60px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.5s ease;
        }

        .node-core::after {
            content: "";
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        /* Stable State (Green) */
        .core-stable {
            background: radial-gradient(circle at 30% 30%, #4ade80, #0a8a40);
            box-shadow: 0 0 50px #1fc762, 0 0 100px rgba(31, 199, 98, 0.3), 0 0 200px rgba(31, 199, 98, 0.1);
        }
        .core-stable::after {
            background: radial-gradient(circle, rgba(31, 199, 98, 0.2) 0%, transparent 70%);
        }

        /* Warning State (Yellow/Orange) */
        .core-warning {
            background: radial-gradient(circle at 30% 30%, #facc15, #ca8a04);
            box-shadow: 0 0 50px #eab308, 0 0 100px rgba(234, 179, 8, 0.3), 0 0 200px rgba(234, 179, 8, 0.1);
        }
        .core-warning::after {
            background: radial-gradient(circle, rgba(234, 179, 8, 0.2) 0%, transparent 70%);
        }

        /* Critical State (Red) */
        .core-critical {
            background: radial-gradient(circle at 30% 30%, #ef4444, #b91c1c);
            box-shadow: 0 0 50px #ef4444, 0 0 100px rgba(239, 68, 68, 0.5), 0 0 200px rgba(239, 68, 68, 0.2);
            animation: pulse 1s ease-in-out infinite;
        }
        .core-critical::after {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.3) 0%, transparent 70%);
            animation: pulseGlow 1.5s ease-in-out infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        .node-satellite {
            width: 75px;
            height: 75px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        /* Pulse rings */
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(64, 224, 128, 0.3);
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        /* Orbital ring - graf içinde büyütüldü */
        .orbital-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 1px dashed rgba(64, 224, 128, 0.2);
            border-radius: 50%;
            animation: rotate 60s linear infinite;
        }

        .orbital-ring-inner {
            width: 300px;
            height: 300px;
            border: 1px solid rgba(64, 224, 128, 0.15);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotateReverse 40s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes rotateReverse {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(-360deg);
            }
        }

        /* Data streams */
        .data-stream {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #1fc762;
            border-radius: 50%;
            filter: blur(1px);
            animation: flow 3s linear infinite;
            opacity: 0;
        }

        @keyframes flow {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(1);
            }

            10% {
                opacity: 1;
                transform: translate(10px, 10px) scale(1.5);
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(80px, 80px) scale(0.5);
            }
        }

        /* Floating indicators */
        .indicator {
            position: absolute;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
        }

        /* Canvas for particles */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Mini metrics - sayfanın en altına kaydırıldı, boyutlar aynı */
        .mini-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .mini-metric {
            background: rgba(10, 20, 35, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mini-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(31, 199, 98, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1fc762;
        }

        .mini-info h4 {
            font-size: 14px;
            color: white;
            margin-bottom: 2px;
        }

        .mini-info p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Pulse animation for critical items */
        .critical-pulse {
            animation: criticalPulse 2s infinite;
        }

        @keyframes criticalPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        /* Top navigation adjustment */
        .top-nav {
            left: 310px !important;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-nav.sidebar-collapsed {
            left: 110px !important;
        }

        /* Forecast panel - sağ alt köşede */
        .forecast-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(10, 20, 35, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(31, 199, 98, 0.3);
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: white;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .forecast-panel:hover {
            border-color: rgba(31, 199, 98, 0.6);
            box-shadow: 0 10px 30px -5px rgba(31, 199, 98, 0.3);
            transform: translateY(-2px);
        }

        .forecast-time {
            color: #1fc762;
            font-weight: 600;
        }

        .forecast-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* 3D Canvas container */
        #twin-canvas-container {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 550px;
            border-radius: 28px;
            overflow: hidden;
            background: #03050A;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(31,199,98,0.2);
            margin-bottom: 24px;
        }
        #digital-twin-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-tile {
            background: rgba(10,20,35,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(31,199,98,0.2);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.2s;
        }
        .stat-tile:hover { border-color: rgba(31,199,98,0.5); transform: translateY(-2px); }

        /* Mini metrics grid */
        .mini-metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .mini-card {
            background: rgba(10,20,35,0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
    <!-- Auth -->
    <script src="auth.js"></script>
</head>

<body>

    <!-- Sidebar -->

        <!-- Sidebar Footer -->
        <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-white/5">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                    <span class="text-xs font-bold" id="sidebarInitials">AD</span>

    <script type="module">
        // Three.js Particle System
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const canvas = document.getElementById('particle-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Create particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
            const radius = 15 + Math.random() * 5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i + 2] = radius * Math.cos(phi);

            colorArray[i] = 0.2 + Math.random() * 0.3;
            colorArray[i + 1] = 0.6 + Math.random() * 0.4;
            colorArray[i + 2] = 0.2 + Math.random() * 0.3;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 20;

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (event.clientY / window.innerHeight - 0.5) * 2;
        });

        function animate() {
            requestAnimationFrame(animate);

            particlesMesh.rotation.y += 0.0002;
            particlesMesh.rotation.x += 0.0001;
            particlesMesh.rotation.y += mouseX * 0.0005;
            particlesMesh.rotation.x += mouseY * 0.0005;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Load initial content

        // ═══════════════════════════════════════════════════════════════════
        // DIGITAL TWIN 3D SETUP
        // ═══════════════════════════════════════════════════════════════════
        const twinGlobalConfig = {
            speedMul: 1.0,
            deptSpeeds: { it: 1.0, hr: 1.0, iot: 1.0, fin: 1.0 }
        };

        const twinContainer = document.createElement('div');
        twinContainer.id = 'twin-canvas-container';
        const canvas3D = document.createElement('canvas');
        canvas3D.id = 'digital-twin-canvas';
        twinContainer.appendChild(canvas3D);
        
        const twinScene = new THREE.Scene();
        twinScene.background = new THREE.Color(0x03050A);
        twinScene.fog = new THREE.FogExp2(0x03050A, 0.008);
        
        const twinCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        twinCamera.position.set(5, 3, 8);
        twinCamera.lookAt(0, 0, 0);
        
        const twinRenderer = new THREE.WebGLRenderer({ canvas: canvas3D, alpha: false, antialias: true });
        // Initial setup for sizing
        setTimeout(() => {
            if(twinContainer.clientWidth > 0){
                twinRenderer.setSize(twinContainer.clientWidth, twinContainer.clientHeight);
                twinCamera.aspect = twinContainer.clientWidth / twinContainer.clientHeight;
                twinCamera.updateProjectionMatrix();
            }
        }, 100);
        
        twinRenderer.setPixelRatio(window.devicePixelRatio);
        twinRenderer.toneMapping = THREE.ReinhardToneMapping;
        twinRenderer.toneMappingExposure = 1.2;
        
        // Post Processing Bloom
        const renderScene = new RenderPass(twinScene, twinCamera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(twinRenderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Controls
        const twinControls = new OrbitControls(twinCamera, twinRenderer.domElement);
        twinControls.enableDamping = true;
        twinControls.dampingFactor = 0.05;
        twinControls.autoRotate = true;
        twinControls.autoRotateSpeed = 1.2;
        twinControls.enableZoom = true;
        twinControls.enablePan = false;
        twinControls.target.set(0, 0, 0);
        
        // --- Lights ---
        twinScene.add(new THREE.AmbientLight(0x111122));
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 5, 3);
        twinScene.add(mainLight);
        const fillLight = new THREE.PointLight(0x226622, 0.5);
        fillLight.position.set(-2, 1, 4);
        twinScene.add(fillLight);
        const backLight = new THREE.PointLight(0x1fc762, 0.4);
        backLight.position.set(0, 2, -5);
        twinScene.add(backLight);
        
        function createGlowMesh(color, size = 0.8) {
            const geometry = new THREE.SphereGeometry(size, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.BackSide });
            return new THREE.Mesh(geometry, material);
        }
        
        // --- Central Core Node ---
        const coreGeo = new THREE.IcosahedronGeometry(0.9, 0);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x022c22, emissive: 0x011a13, emissiveIntensity: 0.8, metalness: 0.7, roughness: 0.2, flatShading: false });
        const coreNode = new THREE.Mesh(coreGeo, coreMat);
        
        // --- Core Contour Light ---
        const coreEdges = new THREE.EdgesGeometry(coreGeo);
        const coreContour = new THREE.LineSegments(coreEdges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 }));
        coreNode.add(coreContour);
        
        twinScene.add(coreNode);
        
        const ringGeo = new THREE.TorusGeometry(1.15, 0.04, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x064e3b, emissive: 0x022c22, emissiveIntensity: 0.5 });
        const ringX = new THREE.Mesh(ringGeo, ringMat); ringX.rotation.x = Math.PI / 2; twinScene.add(ringX);
        const ringY = new THREE.Mesh(ringGeo, ringMat); ringY.rotation.z = Math.PI / 2; twinScene.add(ringY);
        const ringZ = new THREE.Mesh(ringGeo, ringMat); ringZ.rotation.x = Math.PI / 3; ringZ.rotation.z = Math.PI / 3; twinScene.add(ringZ);
        
        // --- Satellite Nodes ---
        const nodesData = [
            { id: 'it', name: 'IT', pos: new THREE.Vector3(2.2, 0.8, 1.8), color: 0x4ade80, emissive: 0x2ecc71, risk: 0 },
            { id: 'hr', name: 'LOG', pos: new THREE.Vector3(1.2, 1.2, -2.4), color: 0xa855f7, emissive: 0x6b21a5, risk: 0 },
            { id: 'iot', name: 'IoT', pos: new THREE.Vector3(-2.4, 0.2, 1.5), color: 0x38bdf8, emissive: 0x0369a1, risk: 0 },
            { id: 'fin', name: 'FIN', pos: new THREE.Vector3(-1.3, -0.9, -2.0), color: 0xFFD700, emissive: 0xB8860B, risk: 0 }
        ];
        
        const twinSatellites = [];
        nodesData.forEach((node) => {
            const geo = new THREE.SphereGeometry(0.55, 48, 48);
            const mat = new THREE.MeshStandardMaterial({ color: node.color, emissive: node.emissive, emissiveIntensity: 0.4, metalness: 0.6, roughness: 0.3 });
            const sphere = new THREE.Mesh(geo, mat);
            sphere.position.copy(node.pos);
            twinScene.add(sphere);
            
            const glow = createGlowMesh(node.color, 0.85);
            glow.position.copy(node.pos);
            twinScene.add(glow);
            
             twinSatellites.push({ mesh: sphere, glow, data: node, baseColor: node.color, baseEmissive: node.emissive });
            
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.font = 'Bold 24px "Plus Jakarta Sans"'; ctx.fillText(node.name, 10, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            sprite.scale.set(0.8, 0.4, 0.8);
            sprite.position.copy(node.pos.clone().add(new THREE.Vector3(0, 0.85, 0)));
            twinScene.add(sprite);
        });
        
        // --- Connection Lines ---
        nodesData.forEach(node => {
            const start = new THREE.Vector3(0, 0, 0); const end = node.pos;
            const mid = start.clone().lerp(end, 0.5); mid.y += 1.2;
            const curve = new THREE.CubicBezierCurve3(start, mid, mid, end);
            const points = curve.getPoints(50);
            twinScene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: node.color })));
            
            for (let i = 0; i < 8; i++) {
                const particle = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: node.color, emissive: node.emissive }));
                particle.userData = { curve, t: i / 8, baseSpeed: 0.005 + Math.random() * 0.008, targetId: node.id };
                twinScene.add(particle);
            }
        });
        
        const dataStreamParticles = [];
        // Removed flying particles as per request
        
        const gridHelper = new THREE.GridHelper(14, 28, 0x2ecc71, 0x22aa55);
        gridHelper.position.y = -1.6; gridHelper.material.transparent = true; gridHelper.material.opacity = 0.35;
        twinScene.add(gridHelper);
        
        const ringPlane = new THREE.Mesh(new THREE.RingGeometry(2.2, 3.2, 32), new THREE.MeshStandardMaterial({ color: 0x1fc762, emissive: 0x0a5a2a, side: THREE.DoubleSide, transparent: true, opacity: 0.2 }));
        ringPlane.rotation.x = -Math.PI / 2; ringPlane.position.y = -1.5; twinScene.add(ringPlane);
        
        function updateNodeRiskVisuals() {
            twinSatellites.forEach(sat => {
                const riskVal = sat.data.risk || 0;
                const isAnomaly = sat.data.isAnomaly || false;
                
                // Adjusted dynamic thresholds for Graph Attention Weights vs normal load
                const critThresh = isAnomaly ? 24 : 75;
                const warnThresh = isAnomaly ? 20 : 45;

                let colorHex = sat.baseColor;
                if (riskVal > critThresh) {
                    colorHex = 0xef4444; sat.mesh.material.emissiveIntensity = 0.7 + Math.sin(Date.now() * 0.008) * 0.3;
                    sat.glow.material.color.setHex(0xff3333); sat.glow.material.opacity = 0.5;
                } else if (riskVal > warnThresh) {
                    colorHex = 0xfacc15; sat.mesh.material.emissiveIntensity = 0.4 + Math.sin(Date.now() * 0.005) * 0.2;
                    sat.glow.material.color.setHex(0xffaa33);
                } else {
                    sat.mesh.material.emissiveIntensity = 0.3; sat.glow.material.color.setHex(sat.baseColor); sat.glow.material.opacity = 0.2;
                }
                sat.mesh.material.color.setHex(colorHex);
            });
        }
        
        let twinTime = 0;
        function animateTwin() {
            requestAnimationFrame(animateTwin);
            twinTime += 0.016 * twinGlobalConfig.speedMul;
            coreNode.rotation.y += 0.008 * twinGlobalConfig.speedMul; 
            coreNode.rotation.x = Math.sin(twinTime * 0.5) * 0.1;
            const s = 1 + Math.sin(twinTime * 3) * 0.03; ringX.scale.set(s, s, s); ringY.scale.set(s, s, s); ringZ.scale.set(s, s, s);
            
            twinScene.children.forEach(child => {
                if (child.isMesh && child.userData.curve) {
                    const dynamicSpeed = child.userData.baseSpeed * (twinGlobalConfig.deptSpeeds[child.userData.targetId] || 1.0);
                    child.userData.t += dynamicSpeed;
                    if (child.userData.t > 1) child.userData.t = 0;
                    child.position.copy(child.userData.curve.getPoint(child.userData.t));
                }
            });
            // Removed flying particles animation
            updateNodeRiskVisuals();
            twinControls.update();
            
            // Only render effectComposer if canvas is visible/sized
            if (twinContainer.clientWidth > 0) {
                effectComposer.render();
            }
        }
        
        animateTwin();

        // Load Twin Canvas into Dashboard tab immediately on init
        setTimeout(() => {
            const placeholder = document.getElementById('twin-container-placeholder');
            if (placeholder) {
                placeholder.appendChild(twinContainer);
                
                // resize handler
                const resizeObserver = new ResizeObserver(() => {
                    if (twinContainer.clientWidth > 0) {
                        twinCamera.aspect = twinContainer.clientWidth / twinContainer.clientHeight;
                        twinCamera.updateProjectionMatrix();
                        twinRenderer.setSize(twinContainer.clientWidth, twinContainer.clientHeight);
                        effectComposer.setSize(twinContainer.clientWidth, twinContainer.clientHeight);
                    }
                });
                resizeObserver.observe(twinContainer);
            }
        }, 100);

        // Data stream particles (Removed to clean up the UI)
        function createDataStream() {
            // Intentionally left blank as per user request to remove flying particles
        }

        // setTimeout(createDataStream, 1000);

        // Forecast panel click
        document.getElementById('forecastPanel').addEventListener('click', () => {
            alert('📈 Tahmin Modeli: Sistem yükü önümüzdeki 2 saat içinde %15 artacak. CPU kullanımının 14:30-16:00 arasında pik yapması bekleniyor.');
        });

        // ═══════════════════════════════════════════════════════════════════
        // LIVE DATA STREAM — Dashboard
        // ═══════════════════════════════════════════════════════════════════
        (function startDashboardLiveStream() {
            function processDataUpdate(d) {
                try {
                    // Update System Health
                    const sysHealth = document.getElementById('sys-health-val');
                    if (sysHealth) {
                        const health = Math.max(0, 100 - (d.anomaly_score * 100)).toFixed(0);
                        sysHealth.textContent = health;
                    }

                    // Update Active Alarms
                    const dashAlarms = document.getElementById('dash-alarms');
                    if (dashAlarms) {
                        dashAlarms.textContent = d.anomaly ? "4" : "1";
                    }

                    // Update Nodes Colors based on risk scores
                    const risk = d.risk_scores || {};
                    const isGlobalAnomaly = d.anomaly === 1;

                    // Link Live API directly to Twin Animation Speed Config
                    if (d.anomaly_score !== undefined) {
                        const targetMul = 1.0 + Math.max(0, (d.anomaly_score * 3.0));
                        // Smooth interpolation for global speed
                        twinGlobalConfig.speedMul = twinGlobalConfig.speedMul + (targetMul - twinGlobalConfig.speedMul) * 0.1;
                    }

                    function updateNode(id, score, isAnomaly) {
                        const nodeMap = {
                            'node-it': 'it',
                            'node-hr': 'hr',
                            'node-iot': 'iot',
                            'node-fin': 'fin'
                        };
                        const twinId = nodeMap[id];
                        if (!twinId) return;

                        const sat = twinSatellites.find(s => s.data.id === twinId);
                        if(sat) {
                            sat.data.risk = score;
                            sat.data.isAnomaly = isAnomaly;
                        }
                        
                        if (score !== undefined) {
                            twinGlobalConfig.deptSpeeds[twinId] = 1.0 + (score / 100) * 3.0;
                        }
                    }

                    updateNode('node-it', risk.IT, isGlobalAnomaly);
                    updateNode('node-hr', risk.HR, isGlobalAnomaly);
                    updateNode('node-iot', risk.IoT, isGlobalAnomaly);
                    updateNode('node-fin', risk.Finans, isGlobalAnomaly);

                    // Update Central Core Node Color
                    if (isGlobalAnomaly) {
                        coreNode.material.color.setHex(0xef4444);
                        coreNode.material.emissive.setHex(0xb91c1c);
                    } else if (risk.IT > 45 || risk.HR > 45 || risk.IoT > 45 || risk.Finans > 45) {
                        coreNode.material.color.setHex(0xfacc15);
                        coreNode.material.emissive.setHex(0xca8a04);
                    } else {
                        coreNode.material.color.setHex(0x022c22);
                        coreNode.material.emissive.setHex(0x011a13);
                    }

                    // Update Indicators dynamically
                    const indIt = document.getElementById('ind-it');
                    if (indIt) indIt.textContent = `${(d.net_thr * 100).toFixed(0)}% Util · ${(d.net_lat * 1).toFixed(1)}ms`;

                    const indHr = document.getElementById('ind-hr');
                    if (indHr) indHr.textContent = `${(d.log_soc * 10).toFixed(1)}/10 Sat · ${d.row_id % 100}% Load`;

                    const indIot = document.getElementById('ind-iot');
                    if (indIot) indIot.textContent = `${(d.iot_temp * 50 + 20).toFixed(1)}°C · ${(d.iot_vib * 100).toFixed(0)} Hz`;

                    const indFin = document.getElementById('ind-fin');
                    if (indFin) indFin.textContent = `$${(d.fin_cost * 1).toFixed(1)}k · ${(d.fin_inv * 1).toFixed(1)}% Inv`;

                } catch (e) {}
            }

            // Listen to global stream
            window.addEventListener('asgard_stream_data', (e) => {
                processDataUpdate(e.detail);
            });

            // Initial load from buffer
            setTimeout(() => {
                const buffer = JSON.parse(sessionStorage.getItem('asgard_global_stream_buffer') || '[]');
                if (buffer.length > 0) {
                    processDataUpdate(buffer[buffer.length - 1]);
                }
            }, 500);
        })();

        // ── Auth ──────────────────────────────────────────────────────────
        (async () => {
            const user = await initAuth();
            if (!user) return;
            // Sidebar dinamik kullanıcı bilgisi
            const ini = document.getElementById('sidebarInitials');
            const nm = document.getElementById('sidebarName');
            const em = document.getElementById('sidebarEmail');
            if (ini) ini.textContent = user.initials || 'AD';
            if (nm) nm.textContent = user.name || 'Admin User';
            if (em) em.textContent = user.email || 'admin@asgard.ai';
        })();
