<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGARD AI · Giriş</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #03050A;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbFloat 12s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #1fc762, transparent);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0ea5e9, transparent);
            bottom: -200px;
            right: -200px;
            animation-delay: 4s;
        }

        .bg-orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a855f7, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 8s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: scale(1) translate(0, 0);
            }

            33% {
                transform: scale(1.1) translate(20px, -20px);
            }

            66% {
                transform: scale(0.9) translate(-20px, 20px);
            }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(31, 199, 98, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 199, 98, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Login card */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(10, 15, 25, 0.55);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(31, 199, 98, 0.2);
            border-radius: 32px;
            padding: 48px 40px;
            width: 420px;
            box-shadow:
                0 40px 80px -20px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(31, 199, 98, 0.08) inset,
                0 0 60px -20px rgba(31, 199, 98, 0.3);
            animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-card.shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-8px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(8px);
            }
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            background: radial-gradient(circle at 30% 30%, #4ade80, #0a8a40);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 0 30px rgba(31, 199, 98, 0.5), 0 0 60px rgba(31, 199, 98, 0.2);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(31, 199, 98, 0.5), 0 0 60px rgba(31, 199, 98, 0.2);
            }

            50% {
                box-shadow: 0 0 50px rgba(31, 199, 98, 0.8), 0 0 80px rgba(31, 199, 98, 0.4);
            }
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .logo-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 40%, #1fc762);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 4px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 15px;
            transition: color 0.3s;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 14px 14px 46px;
            font-size: 15px;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(31, 199, 98, 0.5);
            background: rgba(31, 199, 98, 0.04);
            box-shadow: 0 0 0 3px rgba(31, 199, 98, 0.08), 0 0 20px rgba(31, 199, 98, 0.1);
        }

        .form-input:focus+.input-icon,
        .input-wrapper:has(.form-input:focus) .input-icon {
            color: #1fc762;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Password toggle */
        .pass-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-size: 14px;
        }

        .pass-toggle:hover {
            color: #1fc762;
        }

        /* Error message */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .error-msg.show {
            display: flex;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #15803d);
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px -8px rgba(34, 197, 94, 0.5);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -8px rgba(34, 197, 94, 0.7);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Demo hint */
        .demo-hint {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .demo-hint-title {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            text-align: center;
        }

        .demo-users {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .demo-user-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-user-btn:hover {
            background: rgba(31, 199, 98, 0.08);
            border-color: rgba(31, 199, 98, 0.25);
            color: white;
        }

        .demo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="grid-overlay"></div>

    <div class="login-card" id="loginCard">

        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-brain"></i>
            </div>
            <div class="logo-title">ASGARD · AI</div>
            <div class="logo-subtitle">AIOps Intelligence Platform</div>
        </div>

        <!-- Form -->
        <form id="loginForm" autocomplete="off">

            <div class="form-group">
                <label class="form-label">Kullanıcı Adı</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="username" placeholder="kullanici_adi"
                        autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Şifre</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="••••••••"
                        autocomplete="current-password">
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="pass-toggle" id="passToggle">
                        <i class="fas fa-eye" id="passIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Error -->
            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Kullanıcı adı veya şifre hatalı</span>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <div class="spinner" id="spinner"></div>
                <i class="fas fa-sign-in-alt" id="btnIcon"></i>
                <span id="btnText">Sisteme Giriş Yap</span>
            </button>
        </form>

        <!-- Demo Kullanıcılar -->
        <div class="demo-hint">
            <div class="demo-hint-title">Hızlı Giriş — Demo Kullanıcılar</div>
            <div class="demo-users">
                <button class="demo-user-btn" onclick="fillDemo('admin','Admin@2025')">
                    <div class="demo-dot" style="background:#FFD700"></div>
                    <div>
                        <div style="font-weight:600;color:white">Admin</div>
                        <div>Tam Erişim</div>
                    </div>
                </button>
                <button class="demo-user-btn" onclick="fillDemo('finans_mudur','Fin@2025')">
                    <div class="demo-dot" style="background:#22c55e"></div>
                    <div>
                        <div style="font-weight:600;color:white">Finans Müdürü</div>
                        <div>finans_mudur</div>
                    </div>
                </button>
                <button class="demo-user-btn" onclick="fillDemo('it_mudur','IT@2025')">
                    <div class="demo-dot" style="background:#3b82f6"></div>
                    <div>
                        <div style="font-weight:600;color:white">IT Müdürü</div>
                        <div>it_mudur</div>
                    </div>
                </button>
                <button class="demo-user-btn" onclick="fillDemo('iot_mudur','IoT@2025')">
                    <div class="demo-dot" style="background:#ef4444"></div>
                    <div>
                        <div style="font-weight:600;color:white">IoT Müdürü</div>
                        <div>iot_mudur</div>
                    </div>
                </button>
                <button class="demo-user-btn" onclick="fillDemo('lojistik_mudur','Loj@2025')" style="grid-column:span 2">
                    <div class="demo-dot" style="background:#a855f7"></div>
                    <div>
                        <div style="font-weight:600;color:white">Otonom Lojistik Müdürü</div>
                        <div>lojistik_mudur</div>
                    </div>
                </button>
            </div>
        </div>

        <div class="login-footer">
            © 2025 ASGARD Intelligence · Tüm hakları saklıdır
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5003';

        // Token kontrolü yap (sessiz arka plan doğrulaması)
        const currentToken = localStorage.getItem('asgard_token');
        if (currentToken) {
            fetch(`${API}/api/me`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            }).then(res => {
                if (res.ok) {
                    window.location.replace('dashboard.html');
                } else {
                    localStorage.removeItem('asgard_token');
                }
            }).catch(e => console.error("Doğrulama hatası:", e));
        }

        // Şifre toggle
        document.getElementById('passToggle').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Demo kullanıcı doldur
        function fillDemo(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('username').dispatchEvent(new Event('input'));
        }

        // Login formu
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const card = document.getElementById('loginCard');
            const errorMsg = document.getElementById('errorMsg');
            const spinner = document.getElementById('spinner');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');
            const submitBtn = document.getElementById('submitBtn');

            if (!username || !password) {
                errorMsg.querySelector('#errorText').textContent = 'Kullanıcı adı ve şifre gereklidir';
                errorMsg.classList.add('show');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnIcon.style.display = 'none';
            btnText.textContent = 'Giriş yapılıyor...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Giriş başarısız');
                }

                // Token kaydet
                localStorage.setItem('asgard_token', data.token);

                // Başarı animasyonu
                btnText.textContent = '✓ Giriş Başarılı!';
                submitBtn.style.background = 'linear-gradient(135deg, #15803d, #166534)';
                spinner.style.display = 'none';

                // Rol bazlı yönlendirme
                await new Promise(r => setTimeout(r, 700));
                window.location.href = 'dashboard.html';

            } catch (err) {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnIcon.style.display = 'block';
                btnText.textContent = 'Sisteme Giriş Yap';
                submitBtn.style.background = '';

                errorMsg.querySelector('#errorText').textContent = err.message;
                errorMsg.classList.add('show');

                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        });

        // Enter tuşu
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
        });
    </script>
</body>

</html>
